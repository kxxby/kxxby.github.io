<!DOCTYPE html>
<html lang="pl" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Historia – Pojęcia na Sprawdzian</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300;1,9..40,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --bg2: #111111;
    --bg3: #1a1a1a;
    --surface: #161616;
    --border: #2a2a2a;
    --border2: #333;
    --text: #f0f0f0;
    --text2: #a0a0a0;
    --text3: #606060;
    --accent: #ffffff;
    --accent-inv: #000000;
    --tag-bg: #222;
    --tag-text: #888;
    --highlight: #f0f0f0;
    --date-bg: #222;
    --date-text: #ccc;
    --strong-color: #ffffff;
    --em-color: #aaa;
    --input-bg: #111;
    --cat-active-bg: #fff;
    --cat-active-text: #000;
    --shadow: rgba(0,0,0,0.5);
    --toggle-bg: #222;
  }

  [data-theme="light"] {
    --bg: #f5f5f5;
    --bg2: #ececec;
    --bg3: #e2e2e2;
    --surface: #ffffff;
    --border: #d8d8d8;
    --border2: #c0c0c0;
    --text: #0a0a0a;
    --text2: #555;
    --text3: #999;
    --accent: #000000;
    --accent-inv: #ffffff;
    --tag-bg: #e8e8e8;
    --tag-text: #666;
    --highlight: #000;
    --date-bg: #e8e8e8;
    --date-text: #333;
    --strong-color: #000000;
    --em-color: #444;
    --input-bg: #fff;
    --cat-active-bg: #000;
    --cat-active-text: #fff;
    --shadow: rgba(0,0,0,0.1);
    --toggle-bg: #e0e0e0;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    min-height: 100vh;
    padding: 0 0 80px;
    transition: background 0.25s, color 0.25s;
  }

  /* ── TOP BAR ── */
  .topbar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;
    transition: background 0.25s, border-color 0.25s;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }

  .brand {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1rem;
    letter-spacing: -0.02em;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .brand-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--text);
  }

  .topbar-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .count-badge {
    font-size: 0.72rem;
    font-weight: 500;
    color: var(--text3);
    letter-spacing: 0.04em;
  }

  /* Toggle */
  .theme-toggle {
    background: var(--toggle-bg);
    border: 1px solid var(--border2);
    border-radius: 100px;
    width: 48px;
    height: 26px;
    cursor: pointer;
    position: relative;
    transition: background 0.25s, border-color 0.25s;
    flex-shrink: 0;
  }

  .theme-toggle::after {
    content: '';
    position: absolute;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: var(--text);
    top: 3px;
    left: 4px;
    transition: transform 0.25s cubic-bezier(.4,0,.2,1), background 0.25s;
  }

  [data-theme="light"] .theme-toggle::after {
    transform: translateX(22px);
  }

  .toggle-icon {
    position: absolute;
    font-size: 11px;
    top: 50%;
    transform: translateY(-50%);
    pointer-events: none;
    user-select: none;
  }
  .icon-moon { left: 5px; }
  .icon-sun  { right: 4px; }

  /* ── HERO ── */
  .hero {
    padding: 64px 24px 48px;
    max-width: 900px;
    margin: 0 auto;
    animation: fadeUp 0.6s ease both;
  }

  .hero-label {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 20px;
  }

  .hero-label::before {
    content: '';
    display: block;
    width: 24px;
    height: 1px;
    background: var(--text3);
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: clamp(2rem, 6vw, 3.8rem);
    line-height: 1.05;
    letter-spacing: -0.04em;
    color: var(--text);
    margin-bottom: 14px;
  }

  .hero-sub {
    font-size: 1rem;
    color: var(--text2);
    font-weight: 300;
    max-width: 480px;
    line-height: 1.6;
  }

  /* ── CONTROLS ── */
  .controls {
    max-width: 900px;
    margin: 0 auto;
    padding: 0 24px 28px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    animation: fadeUp 0.6s 0.1s ease both;
  }

  .search-wrap {
    position: relative;
  }

  .search-icon {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text3);
    font-size: 1rem;
    pointer-events: none;
  }

  #search {
    width: 100%;
    padding: 14px 16px 14px 44px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s, background 0.25s;
  }

  #search::placeholder { color: var(--text3); }
  #search:focus {
    border-color: var(--border2);
    box-shadow: 0 0 0 3px color-mix(in srgb, var(--text) 8%, transparent);
  }

  .categories {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .cat-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.78rem;
    font-weight: 500;
    padding: 6px 14px;
    border: 1px solid var(--border);
    border-radius: 100px;
    background: transparent;
    color: var(--text2);
    cursor: pointer;
    transition: all 0.18s;
    letter-spacing: 0.02em;
  }

  .cat-btn:hover {
    border-color: var(--border2);
    color: var(--text);
    background: var(--bg3);
  }

  .cat-btn.active {
    background: var(--cat-active-bg);
    color: var(--cat-active-text);
    border-color: var(--cat-active-bg);
  }

  /* ── GRID ── */
  .grid-wrap {
    max-width: 900px;
    margin: 0 auto;
    padding: 0 24px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 12px;
  }

  /* ── CARD ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s, background 0.25s;
    animation: fadeUp 0.5s ease both;
    cursor: default;
  }

  .card:hover {
    border-color: var(--border2);
    transform: translateY(-2px);
    box-shadow: 0 8px 32px var(--shadow);
  }

  .card.hidden { display: none; }

  .card-head {
    padding: 14px 16px 12px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    border-bottom: 1px solid var(--border);
  }

  .card-icon-wrap {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    background: var(--bg3);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
    flex-shrink: 0;
    border: 1px solid var(--border);
  }

  .card-title-area {
    flex: 1;
    min-width: 0;
  }

  .card-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.88rem;
    color: var(--text);
    line-height: 1.3;
    letter-spacing: -0.01em;
  }

  .card-cat-tag {
    display: inline-block;
    margin-top: 5px;
    font-size: 0.68rem;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--tag-text);
    background: var(--tag-bg);
    padding: 2px 8px;
    border-radius: 100px;
    border: 1px solid var(--border);
  }

  .card-body {
    padding: 14px 16px;
    font-size: 0.9rem;
    line-height: 1.7;
    color: var(--text2);
    font-weight: 300;
  }

  .card-body strong {
    color: var(--strong-color);
    font-weight: 600;
  }

  .card-body em {
    color: var(--em-color);
    font-style: italic;
  }

  .card-body .date {
    display: inline-flex;
    align-items: center;
    background: var(--date-bg);
    color: var(--date-text);
    font-family: 'Syne', sans-serif;
    font-size: 0.78rem;
    font-weight: 600;
    padding: 1px 7px;
    border-radius: 5px;
    border: 1px solid var(--border2);
    margin: 0 1px;
    letter-spacing: -0.01em;
  }

  /* ── FOOTER BAR ── */
  .section-label {
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }

  /* ── NO RESULTS ── */
  .no-results {
    grid-column: 1/-1;
    text-align: center;
    color: var(--text3);
    padding: 64px 24px;
    font-size: 0.95rem;
  }

  .no-results span {
    display: block;
    font-size: 2rem;
    margin-bottom: 12px;
  }

  /* ── ANIMATIONS ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: none; }
  }

  .card:nth-child(1)  { animation-delay: .03s }
  .card:nth-child(2)  { animation-delay: .06s }
  .card:nth-child(3)  { animation-delay: .09s }
  .card:nth-child(4)  { animation-delay: .12s }
  .card:nth-child(5)  { animation-delay: .15s }
  .card:nth-child(6)  { animation-delay: .18s }
  .card:nth-child(7)  { animation-delay: .21s }
  .card:nth-child(8)  { animation-delay: .24s }
  .card:nth-child(n+9){ animation-delay: .27s }

  /* ── RESPONSIVE ── */
  @media (max-width: 600px) {
    .hero { padding: 40px 20px 32px; }
    .controls, .grid-wrap { padding-left: 16px; padding-right: 16px; }
    .grid { grid-template-columns: 1fr; }
    h1 { font-size: 2rem; }
  }
</style>
</head>
<body>

</div>

<!-- GRID -->
<div class="grid-wrap">
  <div class="grid" id="grid"></div>
</div>

// ─── APP LOGIC ──────────────────────────────────────────────────────────────
const categories = ['Wszystkie', ...new Set(data.map(d => d.cat))];
let activeCategory = 'Wszystkie';

const gridEl    = document.getElementById('grid');
const catsEl    = document.getElementById('cats');
const searchEl  = document.getElementById('search');
const countEl   = document.getElementById('count-label');

function updateCount(visible, total) {
  countEl.textContent = visible === total
    ? `${total} pojęć`
    : `${visible} / ${total}`;
}

function render() {
  const q = searchEl.value.toLowerCase().trim();
  let visible = 0;
  document.querySelectorAll('.card').forEach(card => {
    const title = card.dataset.title.toLowerCase();
    const body  = card.dataset.body.toLowerCase();
    const cat   = card.dataset.cat;
    const catMatch  = activeCategory === 'Wszystkie' || cat === activeCategory;
    const textMatch = !q || title.includes(q) || body.includes(q);
    const show = catMatch && textMatch;
    card.classList.toggle('hidden', !show);
    if (show) visible++;
  });

  updateCount(visible, data.length);

  let noRes = document.getElementById('no-results');
  if (visible === 0) {
    if (!noRes) {
      noRes = document.createElement('div');
      noRes.id = 'no-results';
      noRes.className = 'no-results';
      noRes.innerHTML = `<span>∅</span>Nie znaleziono pojęcia dla „${searchEl.value}"`;
      gridEl.appendChild(noRes);
    }
  } else {
    noRes && noRes.remove();
  }
}

// Build category buttons
categories.forEach(cat => {
  const btn = document.createElement('button');
  btn.className = 'cat-btn' + (cat === 'Wszystkie' ? ' active' : '');
  btn.textContent = cat;
  btn.onclick = () => {
    activeCategory = cat;
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  };
  catsEl.appendChild(btn);
});

// Build cards
data.forEach(item => {
  const card = document.createElement('div');
  card.className = 'card';
  card.dataset.title = item.title;
  card.dataset.body  = item.body.replace(/<[^>]+>/g, '');
  card.dataset.cat   = item.cat;
  card.innerHTML = `
    <div class="card-head">
      <div class="card-icon-wrap">${item.icon}</div>
      <div class="card-title-area">
        <div class="card-title">${item.title}</div>
        <span class="card-cat-tag">${item.cat}</span>
      </div>
    </div>
    <div class="card-body">${item.body}</div>
  `;
  gridEl.appendChild(card);
});

updateCount(data.length, data.length);
searchEl.addEventListener('input', render);

// ─── THEME TOGGLE ───────────────────────────────────────────────────────────
const toggleBtn = document.getElementById('themeToggle');
const html = document.documentElement;

// Load saved preference
const saved = localStorage.getItem('theme') || 'dark';
html.setAttribute('data-theme', saved);

toggleBtn.addEventListener('click', () => {
  const current = html.getAttribute('data-theme');
  const next = current === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
});
</script>
